- 未经用户确认，不得锁定具体业务规则。
- 可以使用 `mcp/server-memory` 作为临时记忆，但交接前必须把已确认记忆序列化回写到 PRD。
- PRD 作为 coder/evaluator 的单一交接文件，仅按标题索引快速读取内容。

(等待用户输入初始想法后开始规划对话)
